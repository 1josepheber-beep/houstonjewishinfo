<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HJI Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#13294b; --navy-2:#1f3a63; --orange:#e87722; --orange-dk:#c45f10;
    --ink:#16202e; --muted:#5d6b7e; --line:#e3e7ee; --bg:#f4f6fa; --card:#ffffff;
    --good:#1f8a52; --good-bg:#e7f5ed; --warn:#b42318; --warn-bg:#fdeceb;
    --radius:14px; --shadow:0 1px 2px rgba(19,41,75,.06),0 8px 24px rgba(19,41,75,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:15px;line-height:1.5}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:600;letter-spacing:-.01em;margin:0}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--orange-dk)}

  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    width:100%;max-width:460px;padding:34px;border:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .brand .mark{width:38px;height:38px;border-radius:9px;background:var(--navy);
    color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Fraunces",serif;font-weight:700;font-size:20px;letter-spacing:-.5px}
  .brand .mark b{color:var(--orange)}
  .login h1{font-size:25px;color:var(--navy)}
  .login p.sub{color:var(--muted);margin:4px 0 22px;font-size:13.5px}
  label{display:block;font-weight:600;font-size:12.5px;color:var(--navy);
    margin:14px 0 5px;text-transform:uppercase;letter-spacing:.04em}
  .field{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    background:#fbfcfe;color:var(--ink)}
  .field:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,119,34,.15)}
  .hint{font-size:12px;color:var(--muted);margin-top:5px}
  .btn{background:var(--orange);color:#fff;font-weight:600;padding:12px 18px;border-radius:10px;
    font-size:14.5px;transition:.15s}
  .btn:hover{background:var(--orange-dk)}
  .btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--line)}
  .btn.ghost:hover{background:#eef1f6}
  .btn.danger{background:var(--warn)}
  .btn.good{background:var(--good)}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .login-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px}
  .err{background:var(--warn-bg);color:var(--warn);padding:10px 13px;border-radius:9px;
    font-size:13px;margin-top:14px;display:none}

  .app{display:none;min-height:100vh;grid-template-columns:262px 1fr}
  .side{background:var(--navy);color:#cdd6e4;padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .side .brand{margin:4px 6px 18px}
  .side .brand h1{color:#fff;font-size:19px}
  .side .seclabel{font-size:11px;text-transform:uppercase;letter-spacing:.08em;
    color:#7d8aa3;margin:16px 8px 6px}
  .navitem{display:flex;justify-content:space-between;align-items:center;gap:8px;
    width:100%;text-align:left;background:transparent;color:#cdd6e4;padding:8px 10px;
    border-radius:9px;font-size:13.5px}
  .navitem:hover{background:var(--navy-2);color:#fff}
  .navitem.active{background:var(--orange);color:#fff;font-weight:600}
  .navitem .count{font-size:11.5px;opacity:.8;background:rgba(255,255,255,.14);
    padding:1px 7px;border-radius:20px}
  .navitem.active .count{background:rgba(255,255,255,.25)}
  .navitem .dot{width:8px;height:8px;border-radius:50%;background:var(--orange);
    display:inline-block;margin-left:6px;vertical-align:middle}

  .main{padding:0;overflow-y:auto;overflow-x:hidden;height:100vh;min-width:0}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(244,246,250,.86);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:16px 26px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .topbar h2{font-size:21px;color:var(--navy)}
  .spacer{flex:1}
  .badge{font-size:12px;font-weight:600;padding:5px 11px;border-radius:30px;letter-spacing:.02em}
  .badge.live{background:var(--warn-bg);color:var(--warn)}
  .badge.test{background:var(--good-bg);color:var(--good)}
  .badge.view{background:#eef1f6;color:var(--navy)}
  .bell{position:relative;background:#fff;border:1px solid var(--line);color:var(--navy);
    padding:7px 13px;border-radius:30px;font-weight:600;font-size:13px;display:none;align-items:center;gap:7px}
  .bell.show{display:inline-flex}
  .bell:hover{background:#fff4ea;border-color:var(--orange)}
  .bell .n{background:var(--orange);color:#fff;border-radius:20px;padding:0 7px;font-size:12px;min-width:18px;text-align:center}
  .content{padding:22px 26px 60px;min-width:0}

  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;border-radius:var(--radius)}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line)}
  thead th{background:#f7f9fc;text-align:left;font-size:11.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--line)}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:top}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafbfe}
  td.cell{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill{font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap}
  .pill.on{background:var(--good-bg);color:var(--good)}
  .pill.off{background:#fff1e6;color:var(--orange-dk)}
  .rowact{display:flex;gap:6px;justify-content:flex-end}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .loading{padding:40px;text-align:center;color:var(--muted)}

  .review-card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
  .review-card.flash{animation:flash 1.6s ease}
  @keyframes flash{0%{background:#fff7ee}100%{background:#fff}}
  .review-card .meta{flex:1;min-width:0}
  .review-card .tab{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--orange-dk);font-weight:600}
  .review-card .ttl{font-weight:600;color:var(--navy)}
  .review-card .sub{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .review-actions{display:flex;gap:7px;flex-shrink:0}

  .overlay{position:fixed;inset:0;background:rgba(19,41,75,.45);display:none;place-items:center;padding:24px;z-index:50}
  .modal{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);width:100%;max-width:620px;max-height:90vh;overflow:auto}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--card)}
  .modal-head h3{font-size:19px;color:var(--navy)}
  .modal-body{padding:8px 24px 4px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
  textarea.field{min-height:78px;resize:vertical}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
    padding:11px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:99}
  .toast.show{opacity:1;pointer-events:auto}
  .toast.bad{background:var(--warn)}
  .hamburger{display:none;background:#fff;border:1px solid var(--line);color:var(--navy);
    width:40px;height:40px;border-radius:10px;font-size:19px;align-items:center;justify-content:center;flex-shrink:0}
  .hamburger:hover{background:#eef1f6}
  .side .btn.ghost{color:#fff;border-color:rgba(255,255,255,.32);background:rgba(255,255,255,.08)}
  .side .btn.ghost:hover{background:rgba(255,255,255,.18);color:#fff}
  .side-backdrop{position:fixed;inset:0;background:rgba(19,41,75,.5);z-index:55;display:none}
  .side-backdrop.show{display:block}
  /* ---- Global search ---- */
  .searchbar{flex-basis:100%;position:relative;margin-top:2px}
  .searchwrap{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);
    border-radius:11px;padding:9px 13px;box-shadow:var(--shadow)}
  .searchwrap:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,119,34,.15)}
  .searchwrap svg{flex-shrink:0;color:var(--muted)}
  .searchwrap input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-size:15px;color:var(--ink)}
  .searchclear{display:none;background:none;border:none;color:var(--muted);font-size:22px;line-height:1;padding:0 3px}
  .searchclear.show{display:block}
  .searchdd{position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);
    border-radius:12px;box-shadow:0 12px 40px rgba(19,41,75,.18);max-height:62vh;overflow:auto;z-index:30;display:none}
  .searchdd.show{display:block}
  .searchres{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
    padding:11px 14px;border-bottom:1px solid var(--line)}
  .searchres:last-child{border-bottom:none}
  .searchres:hover{background:#fafbfe}
  .searchres.cur{background:#fff1e6;box-shadow:inset 3px 0 0 var(--orange)}
  .searchres .nm{flex:1;min-width:0;font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .searchres .nm small{display:block;font-weight:400;color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .searchres .tag{flex-shrink:0;font-size:11px;font-weight:600;color:var(--orange-dk);background:#fff1e6;padding:3px 9px;border-radius:20px}
  .searchnote{padding:16px;text-align:center;color:var(--muted);font-size:13px}
  tbody tr.rowflash{animation:rowflash 2s ease}
  @keyframes rowflash{0%,18%{background:#fff3e2}100%{background:transparent}}

  @media (max-width:760px){
    .app{grid-template-columns:1fr}
    .hamburger{display:inline-flex}
    .side{position:fixed;top:0;left:0;height:100vh;width:262px;z-index:60;
      transform:translateX(-100%);transition:transform .25s ease;box-shadow:8px 0 40px rgba(0,0,0,.28)}
    .side.open{transform:translateX(0)}
    td.hideMobile,th.hideMobile{display:none}
    td.cell{white-space:normal;max-width:none}
  }
  /* ---- Feed visibility indicator ---- */
  tbody tr.row-hidden{background:#fbf3e4}
  tbody tr.row-hidden:hover{background:#f7ecd5}
  tbody tr.row-off{background:#eae8ed}
  tbody tr.row-off:hover{background:#e3e0e7}
  tbody tr.row-off td{color:#9aa0a8}
  .feedchip{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;vertical-align:middle;letter-spacing:.02em}
  .feedchip.hid{background:#f3e2bf;color:#866011}
  .feedchip.off{background:#dcdce1;color:#5d6470}
  .navright{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .navhidden{font-size:10px;font-weight:700;color:#3a2a08;background:#f0b86a;padding:1px 7px;border-radius:20px;white-space:nowrap}
  .feednote{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);background:#fff;border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:9px;padding:9px 13px;margin-bottom:14px}
  .feednote b{color:var(--navy);font-weight:600}
  .setwrap{max-width:none}
  .setsec{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--orange-dk);font-weight:700;margin:22px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .setnote{background:#fff;border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:9px;padding:12px 14px;color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:16px;max-width:880px}
  .setnote b{color:var(--navy)}
  .setbar{margin-top:24px}
  .imgfield{display:block}
  .imghint{font-family:sans-serif;font-size:11.5px;color:var(--muted);margin:3px 0 6px;line-height:1.45}
  .imgprev{display:none;max-width:150px;max-height:110px;border-radius:8px;border:1px solid var(--line);margin:8px 0;object-fit:cover;background:#f4f6fa}
  .imgup{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:4px}
  .imgfile{font-size:12.5px;max-width:210px}
  .imgname{flex:1;min-width:160px}
  .imgstatus{font-size:12px;color:var(--muted)}
  tr.catgroup{cursor:pointer;user-select:none;background:#f3f5fa}
  tr.catgroup:hover{background:#eaeef7}
  tr.catgroup td{font-weight:700;color:var(--navy);padding:11px 14px;border-top:1px solid var(--line)}
  tr.catgroup .chev{display:inline-block;width:13px;color:var(--orange-dk)}
  tr.catgroup .catcount{font-weight:600;color:var(--muted);font-size:12.5px;margin-left:8px}
  .navgroup{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:transparent;color:#cdd6e4;padding:8px 10px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer}
  .navgroup:hover{background:var(--navy-2);color:#fff}
  .navgroup .gchev{display:inline-block;width:12px;color:#7d8aa3}
  .navgroup .gdot{width:8px;height:8px;border-radius:50%;background:var(--orange);display:inline-block;margin-left:auto}
  .navsub{margin:1px 0 6px 12px;padding-left:8px;border-left:1px solid rgba(255,255,255,.08)}
  .navsub .navitem{font-size:13px}
  .iconbtn{background:#fff;border:1px solid var(--line);color:var(--navy);width:38px;height:38px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
  .iconbtn:hover{background:#fff4ea;border-color:var(--orange)}
  .iconbtn.spin svg{animation:hjispin .7s linear}
  @keyframes hjispin{to{transform:rotate(360deg)}}
  .set-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--line);margin:6px 0 16px;padding-bottom:2px}
  .set-tab{flex:0 0 auto;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-weight:600;font-size:13.5px;padding:8px 12px;cursor:pointer;white-space:nowrap;border-radius:8px 8px 0 0}
  .set-tab:hover{color:var(--navy);background:#f3f5fa}
  .set-tab.active{color:var(--orange-dk,#b94218);border-bottom-color:var(--orange,#e87722)}
  .set-group{display:none}
  .set-group.active{display:block}
  .settings-group.active{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:0 26px;align-items:start}
  .setfield{margin:0 0 14px}
  .set-color-row{display:flex;align-items:center;gap:10px}
  .set-color-row input[type=color]{width:44px;height:38px;border:1px solid var(--line);border-radius:8px;padding:2px;background:#fff;cursor:pointer;flex:none}
  .set-img-row{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .set-img-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .set-img-preview{max-height:60px;max-width:170px;border:1px solid var(--line);border-radius:8px;display:none}
  .switch{position:relative;display:inline-flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
  .switch input{position:absolute;opacity:0;width:0;height:0}
  .switch .track{width:46px;height:26px;background:#cdd6e4;border-radius:20px;transition:background .15s;flex:none;position:relative;display:inline-block}
  .switch .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .switch input:checked + .track{background:var(--orange,#e87722)}
  .switch input:checked + .track::after{transform:translateX(20px)}
  .switch .switch-lbl{font-size:13.5px;color:var(--ink)}
  .ad-card{border:1px solid var(--border,#dfe3ea);border-radius:10px;padding:14px 14px 4px;margin:0 0 14px;background:#fcfdff}
  .ad-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .ad-card-title{font-family:sans-serif;font-weight:700;font-size:13px;color:var(--navy,#13294b);letter-spacing:.02em}
  .ad-card-actions{display:flex;align-items:center;gap:6px}
  .ad-mv{padding:6px 11px;font-size:15px;line-height:1;min-width:34px}
  .ad-mv:disabled{opacity:.35;cursor:not-allowed}
  .ad-list{margin-top:6px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;align-items:start}
  .ad-add{margin-top:4px}
</style>
</head>
<body>

<div class="login-wrap" id="loginScreen">
  <div class="login">
    <div class="brand"><div class="mark">H<b>J</b></div><div><h1>HJI Admin</h1></div></div>
    <p class="sub">Enter your password to manage the directory.</p>

    <div id="advSheet">
    <label>Google Sheet ID</label>
    <input class="field" id="inSheet" placeholder="paste Sheet ID">
    <div class="hint">Pre-filled with your live directory. For testing, paste your TEST COPY's ID instead.</div>
    </div>

    <div id="advScript">
    <label>Editing backend URL <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
    <input class="field" id="inScript" placeholder="leave blank for view-only preview">
    <div class="hint">Paste your Apps Script <code>/exec</code> URL to turn on Add / Edit / Delete.</div>
    </div>

    <label>Password</label>
    <input class="field" id="inToken" type="password" placeholder="enter password">

    <div class="err" id="loginErr"></div>
    <div class="login-actions">
      <button class="btn" id="btnConnect">Log in →</button>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="side-backdrop" id="sideBackdrop"></div>
  <aside class="side">
    <div class="brand"><div class="mark">H<b>J</b></div><h1>HJI Admin</h1></div>
    <nav id="nav"></nav>
    <div style="margin-top:20px;padding:0 8px">
      <button class="btn ghost sm" id="btnLogout" style="width:100%">Log out</button>
    </div>
  </aside>

  <section class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
      <h2 id="colTitle">—</h2>
      <span class="spacer"></span>
      <button class="iconbtn" id="btnRefresh" title="Refresh" aria-label="Refresh"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></button>
      <button class="bell" id="bell">🔔 Review <span class="n" id="bellN">0</span></button>
      <span class="badge" id="modeBadge"></span>
      <button class="btn sm" id="btnAdd">+ Add new</button>
      <div class="searchbar">
        <div class="searchwrap">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="admSearch" type="text" autocomplete="off" placeholder="Search all listings…">
          <button id="admSearchClear" class="searchclear" type="button" aria-label="Clear">&times;</button>
        </div>
        <div class="searchdd" id="admSearchDD" role="listbox"></div>
      </div>
    </div>
    <div class="content" id="content"><div class="loading">Loading…</div></div>
  </section>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle">Edit</h3></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn ghost" id="btnCancel">Cancel</button>
      <button class="btn" id="btnSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====================== CONFIG ====================== */
var LIVE_SHEET_ID = '1in7Ac7zknqyR9neWKOCAjOAG4jXCIVTJQfU6jJ72CV8';
var BAKED_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1yJzRglJ8SQ-bNbUjx-gIA2EDyfsdJZFaA6zSQmvqMeHT9T7JjVlcKdcQAuqHmxM/exec';

function $(id){return document.getElementById(id);}
function el(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;}
function remember(){try{localStorage.setItem('hji_admin',JSON.stringify({sheetId:S.sheetId,scriptUrl:S.scriptUrl,token:S.token}));}catch(e){}}
function recall(){try{return JSON.parse(localStorage.getItem('hji_admin')||'{}');}catch(e){return {};}}

function selectInitialCollection(){
  var last; try{last=localStorage.getItem('hji_admin_tab');}catch(e){}

  if(c){selectCollection(c[0],c[1]);}else{selectCollection(COLLECTIONS[0][0],COLLECTIONS[0][1]);}
}
function prettyTab(k){var f=COLLECTIONS.find(function(c){return c[0]===k;});return f?f[1].replace(/^\S+\s/,''):k;}

function toast(msg,bad){var t=$('toast');t.textContent=msg;t.className='toast show'+(bad?' bad':'');t.onclick=null;t.style.cursor='default';setTimeout(function(){t.className='toast';},2600);}

/* ====================== BACKEND ====================== */
function api(action, extra){
  var payload = Object.assign({ action:action, token:S.token }, extra||{});
  return fetch(S.scriptUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(function(r){return r.json();});
}
function gvizRead(tab){
  var url='https://docs.google.com/spreadsheets/d/'+S.sheetId+'/gviz/tq?tqx=out:json&headers=1&sheet='+encodeURIComponent(tab);
  return fetch(url).then(function(r){return r.text();}).then(function(text){
    var json=JSON.parse(text.substring(text.indexOf('{'),text.lastIndexOf('}')+1));
    var headers=(json.table.cols||[]).map(function(c){return (c.label||'').trim();}).filter(Boolean);
    var rows=(json.table.rows||[]).map(function(r){var o={};headers.forEach(function(h,i){var c=r.c[i];o[h]=c?(c.f!=null?String(c.f):(c.v!=null?String(c.v):'')):'';});return o;})
      .filter(function(o){return Object.keys(o).some(function(k){return o[k]!=='';});});
    return {headers:headers,rows:rows};
  });
}

function showErr(m){var e=$('loginErr');e.textContent=m;e.style.display='block';}
(function(){
  var s=recall();
  $('inSheet').value=LIVE_SHEET_ID;
  if(BAKED_SCRIPT_URL){
    $('inScript').value=BAKED_SCRIPT_URL;
    $('advSheet').style.display='none';
    $('advScript').style.display='none';
    $('inToken').focus();
  } else {
    $('inSheet').value=s.sheetId||LIVE_SHEET_ID;
    $('inScript').value=s.scriptUrl||'';
  }
  // Stay logged in across a refresh: if a password was saved, reconnect automatically.
  if(s.token){
    S.token=s.token; S.sheetId=s.sheetId||LIVE_SHEET_ID; S.scriptUrl=BAKED_SCRIPT_URL||s.scriptUrl||'';
    if(S.scriptUrl){
      $('loginScreen').style.display='none';
      document.body.insertAdjacentHTML('beforeend','<div id="reSplash" style="position:fixed;inset:0;display:grid;place-items:center;font-family:sans-serif;font-size:15px;color:#13294b;background:#f4f6fa;z-index:9999">Reconnecting\u2026</div>');
      api('ping').then(function(res){
        var sp=$('reSplash'); if(sp)sp.remove();
        if(res&&res.ok){ S.sheetId=res.sheetId||S.sheetId; S.mode='full'; enterApp(); }
        else { forget(); $('loginScreen').style.display=''; }
      }).catch(function(){
        var sp=$('reSplash'); if(sp)sp.remove(); $('loginScreen').style.display='';
      });
    }
  }
})();
$('inToken').addEventListener('keydown',function(e){if(e.key==='Enter')$('btnConnect').click();});

$('btnConnect').onclick=function(){
  S.sheetId=$('inSheet').value.trim();S.scriptUrl=$('inScript').value.trim();S.token=$('inToken').value;
  if(!S.scriptUrl){showErr('Paste your Apps Script /exec URL, or use "Just view my data".');return;}
  if(!S.token){showErr('Enter your password to connect for editing.');return;}
  $('btnConnect').disabled=true;$('btnConnect').textContent='Connecting…';
  api('ping').then(function(res){
    $('btnConnect').disabled=false;$('btnConnect').textContent='Log in →';
    if(!res||!res.ok){showErr((res&&res.error)||'Could not connect. Check the password.');return;}
    S.sheetId=res.sheetId||S.sheetId;S.mode='full';remember();enterApp();
  }).catch(function(){
    $('btnConnect').disabled=false;$('btnConnect').textContent='Log in →';
    showErr('Could not reach the backend. Check the URL, and that deployment access is "Anyone".');
  });
};

function toggleDrawer(open){
  var s=document.querySelector('.side'),b=$('sideBackdrop');
  var willOpen=(open!==undefined)?open:!s.classList.contains('open');
  s.classList.toggle('open',willOpen);b.classList.toggle('show',willOpen);
}

/* ====================== APP ====================== */
function refreshCurrent(){
  var btn=$('btnRefresh'); if(btn){btn.classList.remove('spin');void btn.offsetWidth;btn.classList.add('spin');setTimeout(function(){btn.classList.remove('spin');},700);}
  if(S.mode==='full')checkPending();
  if(typeof buildSearchIndex==='function')buildSearchIndex();
  if(S.current==='__review__'){openReview();}
  else if(S.current==='__settings__'){openSettings();}
  else if(S.current==='__ads__'){openAds();}
  else if(S.current){selectCollection(S.current,collLabel(S.current));}
  else {selectInitialCollection();}
}
function loadHechsherNames(){
  var reader=(S.mode==='full')?api('list',{sheet:'Hechsherim'}):gvizRead('Hechsherim');
  reader.then(function(res){
    if(!res)return;
    var headers=res.headers||[], rows=res.rows||[];
    var nameCol=headers.find(function(x){return String(x).toLowerCase().trim()==='name';})||'Name';
    var names=[];
    rows.forEach(function(r){ var n=String(r[nameCol]||'').trim(); if(n&&names.indexOf(n)<0)names.push(n); });
    names.sort(function(a,b){return String(a).localeCompare(String(b));});
    S.hechsherNames=names;
  }).catch(function(){});
}
function enterApp(){
  $('loginScreen').style.display='none';$('app').style.display='grid';
  var b=$('modeBadge');
  if(S.mode==='view'){b.className='badge view';b.textContent='VIEW-ONLY PREVIEW';}
  else if(S.sheetId===LIVE_SHEET_ID){b.className='badge live';b.textContent='● LIVE DATA — edits go to your site';}
  else{b.className='badge test';b.textContent='✓ TEST COPY — safe to experiment';}
  $('btnAdd').style.display=(S.mode==='full')?'':'none';
  buildNav();
  buildSearchIndex();
  loadHechsherNames();
  if(S.mode==='full'){
    api('pending').then(function(res){
      if(res&&res.ok){S.pending=res;lastPendingTotal=res.total;updatePendingUI();}
      if(res&&res.ok&&res.total>0){openReview();}
      else{selectInitialCollection();}
    }).catch(function(){selectInitialCollection();});
    setInterval(function(){checkPending();},60000);
  } else {
    selectInitialCollection();
  }
}

var NAV_STANDALONE=['Jobs','RealEstate','Activities'];
function collLabel(key){var c=COLLECTIONS.find(function(x){return x[0]===key;});return c?c[1]:key;}
function groupOf(key){for(var i=0;i<NAV_GROUPS.length;i++){if(NAV_GROUPS[i].keys.indexOf(key)>=0)return NAV_GROUPS[i].label;}return null;}
function navItemEl(key){
  var label=collLabel(key);
  var b=el('button','navitem');b.dataset.key=key;
  b.appendChild(el('span',null,label));
  var right=el('span','navright');
  var cnt=el('span','count','');cnt.id='cnt-'+key;right.appendChild(cnt);
  if(FEED_WINDOWS[key]!==undefined){var hb=el('span','navhidden');hb.id='hid-'+key;hb.style.display='none';right.appendChild(hb);}
  b.appendChild(right);
  b.onclick=function(){selectCollection(key,label);toggleDrawer(false);};
  return b;
}
function applyNavGroup(label){
  var open=!!(S.openNav&&S.openNav[label]);
  document.querySelectorAll('.navgroup').forEach(function(g){if(g.getAttribute('data-group')===label){var ch=g.querySelector('.gchev');if(ch)ch.textContent=open?'▾':'▸';}});
  document.querySelectorAll('.navsub').forEach(function(s){if(s.getAttribute('data-group')===label)s.style.display=open?'':'none';});
}
function toggleNavGroup(label){if(!S.openNav)S.openNav={};S.openNav[label]=!S.openNav[label];applyNavGroup(label);}
function openNavGroupFor(key){var g=groupOf(key);if(g){if(!S.openNav)S.openNav={};S.openNav[g]=true;applyNavGroup(g);}}
function buildNav(){
  var nav=$('nav');nav.innerHTML='';nav.appendChild(el('div','seclabel','Collections'));
  if(!S.openNav)S.openNav={};
  var placed={};
  placed['Ads']=1; // Ads has its own dedicated screen in the Site section
  NAV_GROUPS.forEach(function(g){
    var hdr=el('button','navgroup');hdr.setAttribute('data-group',g.label);
    hdr.appendChild(el('span','gchev','▸'));
    hdr.appendChild(el('span',null,g.label));
    hdr.onclick=function(){toggleNavGroup(g.label);};
    nav.appendChild(hdr);
    var sub=el('div','navsub');sub.setAttribute('data-group',g.label);
    g.keys.forEach(function(key){ if(!COLLECTIONS.find(function(x){return x[0]===key;}))return; placed[key]=1; sub.appendChild(navItemEl(key)); });
    nav.appendChild(sub);
  });
  var extras=NAV_STANDALONE.filter(function(k){return COLLECTIONS.find(function(x){return x[0]===k;});});
  COLLECTIONS.forEach(function(c){ if(!placed[c[0]]&&extras.indexOf(c[0])<0)extras.push(c[0]); });
  extras.forEach(function(key){placed[key]=1;nav.appendChild(navItemEl(key));});
  var ab=el('button','navitem');ab.dataset.key='__ads__';
  ab.appendChild(el('span',null,'📣 Ads'));
  ab.onclick=function(){openAds();toggleDrawer(false);};
  nav.appendChild(ab);
  nav.appendChild(el('div','seclabel','Site'));
  var sb=el('button','navitem');sb.dataset.key='__settings__';
  sb.appendChild(el('span',null,'⚙️ Settings'));
  sb.onclick=function(){openSettings();toggleDrawer(false);};
  nav.appendChild(sb);
  NAV_GROUPS.forEach(function(g){applyNavGroup(g.label);});
  if(S.current)openNavGroupFor(S.current);
}

function openSettings(){
  S.current='__settings__';
  $('colTitle').textContent='Settings';
  $('btnAdd').style.display='none';
  document.querySelectorAll('.navitem').forEach(function(n){n.classList.toggle('active',n.dataset.key==='__settings__');});
  $('content').innerHTML='<div class="loading">Loading settings…</div>';
  var reader=(S.mode==='full')?api('list',{sheet:SETTINGS_TAB}):gvizRead(SETTINGS_TAB);
  reader.then(function(res){
    if(!res||(S.mode==='full'&&!res.ok))throw (res&&res.error)||'error';
    var map={};
    (res.rows||[]).forEach(function(r){var k=((r.Key!=null?r.Key:(r.key!=null?r.key:''))+'').trim().toLowerCase();if(k)map[k]={value:((r.Value!=null?r.Value:(r.value!=null?r.value:''))+''),_row:r._row};});
    renderSettings(map);
  }).catch(function(){
    var c=$('content');c.innerHTML='';
    var w=el('div','setwrap');var n=el('div','setnote');
    n.innerHTML='No <b>Settings</b> tab found in your sheet yet. Add a tab named <b>Settings</b> with two columns titled <b>Key</b> and <b>Value</b>, paste the starter rows you were given, then reload this page.';
    w.appendChild(n);c.appendChild(w);
  });
}

  document.querySelectorAll('#content .set-group').forEach(function(g){g.classList.toggle('active',g.getAttribute('data-cat')===id);});
}
function uploadSettingImage(key,file){
  var f=file.files&&file.files[0]; if(!f)return;
  if(f.size>10*1024*1024){toast('Image is larger than 10MB.',true);return;}
  var url=$('set-'+key), prev=$('setimg-'+key);
  var name=(cleanName(f.name)||('img-'+Date.now()))+'';
  var rd=new FileReader();
  rd.onload=function(){
    var b64=((''+rd.result).split(',')[1])||'';
    toast('Uploading…');
    api('uploadImage',{folder:'images/site',name:name,content:b64}).then(function(res){
      if(res&&res.ok&&res.url){ if(url)url.value=res.url; if(prev){prev.src=res.url;prev.style.display='block';} toast('Uploaded ✓'); }
      else toast((res&&res.error)||'Upload failed.',true);
    }).catch(function(){ toast('Could not reach the backend.',true); });
  };
  rd.readAsDataURL(f);
}
function buildSettingField(f,cur){
  var box=el('div','setfield');
  var lb=el('label',null,f.label); lb.setAttribute('for','set-'+f.key); box.appendChild(lb);
  if(f.type==='textarea'){
    var ta=el('textarea','field'); ta.value=cur; ta.rows=4; ta.id='set-'+f.key; box.appendChild(ta);
  } else if(f.type==='select'){
    var sel=el('select','field'); (f.options||[]).forEach(function(o){var op=el('option',null,o);op.value=o;if(String(o).toLowerCase()===String(cur).toLowerCase())op.selected=true;sel.appendChild(op);}); sel.id='set-'+f.key; box.appendChild(sel);
  } else if(f.type==='toggle'){
    var sw=el('label','switch');
    var cb=el('input'); cb.type='checkbox'; cb.id='set-'+f.key;
    var lc=String(cur).toLowerCase(); if(lc==='yes'||lc==='true'||lc==='1')cb.checked=true;
    var track=el('span','track');
    var sl=el('span','switch-lbl','On / Off');
    sw.appendChild(cb); sw.appendChild(track); sw.appendChild(sl); box.appendChild(sw);
  } else if(f.type==='color'){
    var row=el('div','set-color-row');
    var pick=el('input'); pick.type='color';
    var hex=el('input','field'); hex.type='text'; hex.value=cur; hex.placeholder=f.def||'#000000'; hex.id='set-'+f.key;
    try{ var hv=(cur||f.def||'').trim(); if(/^#?[0-9a-fA-F]{6}$/.test(hv.replace('#','')))pick.value=(hv.charAt(0)==='#'?hv:'#'+hv); }catch(e){}
    pick.oninput=function(){ hex.value=pick.value; };
    hex.oninput=function(){ if(/^#[0-9a-fA-F]{6}$/.test(hex.value))pick.value=hex.value; };
    row.appendChild(pick); row.appendChild(hex); box.appendChild(row);
  } else if(f.type==='image'){
    var ir=el('div','set-img-row');
    var prev=el('img','set-img-preview'); prev.id='setimg-'+f.key; prev.alt=''; if(cur){prev.src=cur;prev.style.display='block';}
    var turl=el('input','field'); turl.type='text'; turl.value=cur; turl.placeholder='Paste an image URL, or upload →'; turl.id='set-'+f.key;
    turl.oninput=function(){ if(turl.value){prev.src=turl.value;prev.style.display='block';}else prev.style.display='none'; };
    var actions=el('div','set-img-actions');
    if(S.mode==='full'){
      var file=el('input'); file.type='file'; file.accept='image/*'; file.style.display='none'; file.id='setfile-'+f.key;
      var up=el('button','btn ghost sm','Upload'); up.type='button'; up.onclick=function(){file.click();};
      file.onchange=function(){ uploadSettingImage(f.key,file); };
      actions.appendChild(up); actions.appendChild(file);
    }
    ir.appendChild(prev); ir.appendChild(turl); ir.appendChild(actions); box.appendChild(ir);
  } else {

/* ====================== GLOBAL SEARCH ====================== */
function primaryFields(headers){
  var nonStatus=headers.filter(function(h){return STATUSY.indexOf(h)<0;});
  return {name:nonStatus[0]||headers[0]||'', sub:nonStatus[1]||''};
}
function runPool(tasks,n){
  return new Promise(function(resolve){
    var i=0,done=0,total=tasks.length; if(!total)return resolve();
    function step(){ if(i>=total)return; var t=tasks[i++];
      t().then(fin,fin); }
    function fin(){ done++; if(done>=total)resolve(); else step(); }
    for(var k=0;k<Math.min(n,total);k++)step();
  });
}
function buildSearchIndex(){
  S.searchIndex=[]; S.searchReady=false;
  var inp=$('admSearch'); if(inp)inp.placeholder='Building search…';
  var tasks=COLLECTIONS.map(function(c){
    return function(){
      var reader=(S.mode==='full')?api('list',{sheet:c[0]}):gvizRead(c[0]);
      return reader.then(function(res){
        if(!res||(S.mode==='full'&&!res.ok))return;
        var headers=res.headers||[], rows=res.rows||[], pf=primaryFields(headers);
        rows.forEach(function(row){
          var name=((row[pf.name]||'')+'').trim(); if(!name)return;
          var sub=((row[pf.sub]||'')+'').trim();
          var blob=headers.map(function(h){return (row[h]||'');}).join(' ').toLowerCase();
          S.searchIndex.push({coll:c[0],label:c[1],name:name,sub:sub,nameL:name.toLowerCase(),blob:blob});
        });
        if(FEED_WINDOWS[c[0]]!==undefined){
          var hc=0; rows.forEach(function(row){var s=feedRowState(row,c[0]); if(s&&s.state==='hidden')hc++;});
          var hb=$('hid-'+c[0]); if(hb){ if(hc){hb.textContent=hc+' hidden';hb.style.display='';} else {hb.style.display='none';} }
        }
      });
    };
  });
  runPool(tasks,4).then(function(){
    S.searchReady=true;
    var i=$('admSearch'); if(i){i.placeholder='Search all listings…'; if(i.value)runSearch(i.value);}
  });
}
function runSearch(q){
  q=(q||'').toLowerCase().trim();
  var dd=$('admSearchDD'); if(!dd)return;
  if(!q){dd.className='searchdd';dd.innerHTML='';return;}
  if(!S.searchReady){dd.className='searchdd show';dd.innerHTML='<div class="searchnote">Building search index…</div>';return;}
  var res=S.searchIndex.filter(function(e){return e.blob.indexOf(q)>=0;});
  res.sort(function(a,b){
    var ar=a.nameL.indexOf(q),br=b.nameL.indexOf(q);
    ar=ar===0?0:(ar>0?1:2); br=br===0?0:(br>0?1:2);
    if(ar!==br)return ar-br;
    return a.name.localeCompare(b.name);
  });
  res=res.slice(0,12);
  if(!res.length){dd.className='searchdd show';dd.innerHTML='<div class="searchnote">No matches found.</div>';return;}
  dd.innerHTML='';
  res.forEach(function(e){
    var b=el('button','searchres');b.type='button';
    var nm=el('div','nm');nm.textContent=e.name; if(e.sub)nm.appendChild(el('small',null,e.sub));
    b.appendChild(nm);
    b.appendChild(el('span','tag',e.label.replace(/^\S+\s/,'')));
    b.onmousedown=function(ev){ev.preventDefault();};
    b.onclick=function(){gotoResult(e);};
    dd.appendChild(b);
  });
  dd.className='searchdd show';
}
function closeSearchDD(){var dd=$('admSearchDD'); if(dd)dd.className='searchdd';}
function gotoResult(e){
  closeSearchDD();
  S.pendingHighlight=e.nameL;
  var inp=$('admSearch'),clr=$('admSearchClear');
  if(inp)inp.value=''; if(clr)clr.className='searchclear';
  if(S.current===e.coll){ highlightPending(); }
  else { selectCollection(e.coll,e.label); }
  toggleDrawer(false);
}
function highlightPending(){
  if(!S.pendingHighlight)return;
  var want=S.pendingHighlight; S.pendingHighlight='';
  var rows=document.querySelectorAll('#content tbody tr'), hit=null,i;
  for(i=0;i<rows.length;i++){ if((rows[i].getAttribute('data-rk')||'')===want){hit=rows[i];break;} }
  if(!hit){ for(i=0;i<rows.length;i++){ if((rows[i].getAttribute('data-rk')||'').indexOf(want)>=0){hit=rows[i];break;} } }
  if(hit){ var ck=hit.getAttribute('data-catkey'); if(ck&&S.openCats&&!S.openCats[ck])toggleCat(ck); hit.scrollIntoView({behavior:'smooth',block:'center'}); hit.classList.add('rowflash'); setTimeout(function(){hit.classList.remove('rowflash');},2100); var eb=hit.querySelector('.rowact button'); if(eb)eb.click(); }
}
(function(){
  var inp=$('admSearch'),clr=$('admSearchClear');
  if(!inp)return;
  function setCur(items,n){ items.forEach(function(it,i){it.classList.toggle('cur',i===n);}); if(items[n])items[n].scrollIntoView({block:'nearest'}); }
  inp.addEventListener('input',function(){ if(clr)clr.className='searchclear'+(inp.value?' show':''); runSearch(inp.value); });
  inp.addEventListener('focus',function(){ if(inp.value)runSearch(inp.value); });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Escape'){inp.value='';if(clr)clr.className='searchclear';closeSearchDD();inp.blur();return;}
    var dd=$('admSearchDD'); var open=dd&&dd.classList.contains('show');
    var items=open?[].slice.call(dd.querySelectorAll('.searchres')):[];
    if(!items.length)return;
    var i=items.indexOf(dd.querySelector('.searchres.cur'));
    if(e.key==='ArrowDown'){e.preventDefault();setCur(items,(i+1)%items.length);}
    else if(e.key==='ArrowUp'){e.preventDefault();setCur(items,i<=0?items.length-1:i-1);}
    else if(e.key==='Enter'){e.preventDefault();var pick=i>=0?items[i]:items[0];if(pick)pick.click();}
  });
  inp.addEventListener('blur',function(){ setTimeout(closeSearchDD,160); });
  if(clr)clr.addEventListener('click',function(){ inp.value='';clr.className='searchclear';closeSearchDD();inp.focus(); });
})();

  $('colTitle').textContent=label.replace(/^\S+\s/,'');
  $('btnAdd').style.display=(S.mode==='full')?'':'none';
  document.querySelectorAll('.navitem').forEach(function(n){n.classList.toggle('active',n.dataset.key===key);});
  if(typeof openNavGroupFor==='function')openNavGroupFor(key);
  $('content').innerHTML='<div class="loading">Loading '+key+'…</div>';
  var reader=(S.mode==='full')?api('list',{sheet:key}):gvizRead(key);
  reader.then(function(res){
    if(!res||(S.mode==='full'&&!res.ok))throw (res&&res.error)||'error';
    S.headers=res.headers;S.rows=res.rows;
    var c=$('cnt-'+key);if(c)c.textContent=S.rows.length;
    renderTable();
  }).catch(function(err){
    $('content').innerHTML='<div class="empty">Could not load <b>'+key+'</b>.<br><span style="font-size:13px">'+(err||'')+'</span></div>';
  });
}

function statusPill(v){
  var t=(v||'').toString().toLowerCase();
  if(t==='active'||t==='yes'||t==='live'||t==='show')return '<span class="pill on">'+v+'</span>';
  if(t==='pending'||t==='no'||t==='hide'||t==='draft')return '<span class="pill off">'+v+'</span>';
  return v?v:'';
}

/* ====================== FEED VISIBILITY INDICATOR ====================== */
/* Mirrors the homepage feed rules: Stories hide 30 days after their date,
   Mazal Tov & Passings 14 days, Events hide once the date passes.
   An item must have Status "active" to appear in the feed at all. */
var FEED_WINDOWS = { 'Stories':30, 'MazalTov':14, 'Passings':14, 'Events':'event' };
function parseAdminDate(s){
  s=String(s||'').trim(); if(!s)return null;
  var m=s.match(/^Date\((\d+),(\d+),(\d+)/); if(m)return new Date(+m[1],+m[2],+m[3]);
  var t=Date.parse(s); if(!isNaN(t))return new Date(t);
  return null;
}
function feedStatusActive(row){
  var k=Object.keys(row).find(function(h){return h.toLowerCase()==='status';});
  if(!k)return true;
  return String(row[k]||'').toLowerCase().trim()==='active';
}
function feedRowState(row,key){
  var win=FEED_WINDOWS[key]; if(win===undefined)return null;
  if(!feedStatusActive(row))return {state:'off',days:0};
  var dk=Object.keys(row).find(function(h){return h.toLowerCase()==='date';});
  var d=dk?parseAdminDate(row[dk]):null;
  if(!d)return {state:'active',days:0};
  var today=new Date(); today.setHours(0,0,0,0);
  var DAY=86400000, now=today.getTime();
  if(win==='event'){
    return (d.getTime()>=now)?{state:'active',days:0}
      :{state:'hidden',days:Math.floor((now-d.getTime())/DAY)};
  }
  var agedOut=d.getTime()+win*DAY;
  return (now<agedOut)?{state:'active',days:0}
    :{state:'hidden',days:Math.floor((now-agedOut)/DAY)};
}
function feedNote(key){
  var w=FEED_WINDOWS[key]; if(w===undefined)return '';
  var txt=(w==='event')?'Hides from the feed <b>once the date passes</b> — then stays searchable.'
    :'Hides from the feed <b>'+w+' days</b> after the date — then stays searchable.';
  return '<div class="feednote">⏳ '+txt+'</div>';
}
function buildRow(row,showCols,statusCol){
  var tr=el('tr');
  tr.setAttribute('data-rk',((row[showCols[0]]||'')+'').toLowerCase().trim());
  var fst=feedRowState(row,S.current);
  if(fst&&fst.state==='hidden')tr.className='row-hidden';
  else if(fst&&fst.state==='off')tr.className='row-off';
  showCols.forEach(function(h,i){
    var td=el('td','cell'+(i>1?' hideMobile':''));
    if(i===0&&fst&&fst.state!=='active'){
      td.appendChild(document.createTextNode(((row[h]||'')+'')+' '));
      td.appendChild(el('span','feedchip '+(fst.state==='off'?'off':'hid'),
        fst.state==='off'?'Off':('Hidden'+(fst.days>0?' '+fst.days+'d':''))));
    } else { td.textContent=(row[h]||''); }
    tr.appendChild(td);
  });
  if(statusCol){var ts=el('td');ts.innerHTML=statusPill(row[statusCol]);tr.appendChild(ts);}
  if(S.mode==='full'){
    var ta=el('td'),w=el('div','rowact');
    var e=el('button','btn ghost sm','Edit');e.onclick=function(){openForm(row);};
    var d=el('button','btn danger sm','Delete');d.onclick=function(){doDelete(row);};
    w.appendChild(e);w.appendChild(d);ta.appendChild(w);tr.appendChild(ta);
  }
  return tr;
}
function toggleCat(cn){
  var open=!(S.openCats&&S.openCats[cn]); if(!S.openCats)S.openCats={}; S.openCats[cn]=open;
  document.querySelectorAll('#content tbody tr').forEach(function(r){
    if(r.classList.contains('catgroup')){ if(r.getAttribute('data-cat')===cn){var ch=r.querySelector('.chev');if(ch)ch.textContent=open?'▾':'▸';} }
    else if(r.getAttribute('data-catkey')===cn){ r.style.display=open?'':'none'; }
  });
}
function renderTable(){
  if(!S.rows.length){$('content').innerHTML=feedNote(S.current)+'<div class="empty">No entries yet in <b>'+S.current+'</b>.'+(S.mode==='full'?'<br>Use “+ Add new” to create the first one.':'')+'</div>';return;}
  var statusCol=S.headers.find(function(h){return STATUSY.indexOf(h)>=0;});
  var showCols=S.headers.filter(function(h){return h!==statusCol;}).slice(0,4);
  var t=el('table'),thead=el('thead'),trh=el('tr');
  showCols.forEach(function(h,i){trh.appendChild(el('th',i>1?'hideMobile':null,h));});
  if(statusCol)trh.appendChild(el('th',null,statusCol));
  if(S.mode==='full')trh.appendChild(el('th',null,''));
  thead.appendChild(trh);t.appendChild(thead);
  var tb=el('tbody');
  var catCol=S.headers.find(function(h){return h.toLowerCase()==='category';});
  if(catCol&&S.rows.length>10){
    if(S.openCatsFor!==S.current){S.openCats={};S.openCatsFor=S.current;}
    var totalCols=showCols.length+(statusCol?1:0)+(S.mode==='full'?1:0);
    var groups={},order=[];
    var catFO=FIELD_OPTIONS[S.current+'.Category'];
    var catLabels={};
    if(catFO&&catFO.options){normOpts(catFO.options).forEach(function(o){catLabels[String(o[0]).toLowerCase()]=o[1];});}
    S.rows.forEach(function(row){
      var rawcat=((row[catCol]||'')+'').trim();
      var cats=rawcat?rawcat.split(/\s*,\s*/).map(function(s){return s.trim();}).filter(Boolean):[];
      if(!cats.length)cats=['Uncategorized'];
      cats.forEach(function(frag){
        var cn=catLabels[frag.toLowerCase()]||frag;
        if(!groups[cn]){groups[cn]=[];order.push(cn);}
        groups[cn].push(row);
      });
    });
    order.sort(function(a,b){if(a==='Uncategorized')return 1;if(b==='Uncategorized')return -1;return a.localeCompare(b);});
    order.forEach(function(cn){
      var open=!!(S.openCats&&S.openCats[cn]);
      var ctr=el('tr','catgroup');ctr.setAttribute('data-cat',cn);
      var ctd=el('td');ctd.colSpan=totalCols;
      ctd.appendChild(el('span','chev',open?'▾':'▸'));
      ctd.appendChild(document.createTextNode(' '+cn+' '));
      ctd.appendChild(el('span','catcount',String(groups[cn].length)));
      ctr.appendChild(ctd);ctr.onclick=function(){toggleCat(cn);};
      tb.appendChild(ctr);
      groups[cn].forEach(function(row){
        var r=buildRow(row,showCols,statusCol);
        r.classList.add('catchild');r.setAttribute('data-catkey',cn);
        if(!open)r.style.display='none';
        tb.appendChild(r);
      });
    });
  } else {
    S.rows.forEach(function(row){tb.appendChild(buildRow(row,showCols,statusCol));});
  }
  t.appendChild(tb);$('content').innerHTML=feedNote(S.current);var tw=el('div','tablewrap');tw.appendChild(t);$('content').appendChild(tw);
  highlightPending();
}

/* ====================== NEEDS REVIEW ====================== */
function openReview(){
  S.current='__review__';
  $('colTitle').textContent='Needs review';
  $('btnAdd').style.display='none';
  document.querySelectorAll('.navitem').forEach(function(n){n.classList.remove('active');});
  var items=(S.pending&&S.pending.items)||[];
  if(!items.length){$('content').innerHTML='<div class="empty">🎉 Nothing waiting — every submission has been reviewed.</div>';return;}
  var wrap=el('div');
  items.forEach(function(it){
    var card=el('div','review-card');
    var meta=el('div','meta');
    meta.appendChild(el('div','tab',prettyTab(it.sheet)));
    meta.appendChild(el('div','ttl',it.label||'(untitled)'));
    if(it.sub)meta.appendChild(el('div','sub',it.sub));
    card.appendChild(meta);
    var acts=el('div','review-actions');
    var ap=el('button','btn good sm','Approve');ap.onclick=function(){approveItem(it);};
    var op=el('button','btn ghost sm','Open');op.onclick=function(){selectCollection(it.sheet,(COLLECTIONS.find(function(c){return c[0]===it.sheet;})||[it.sheet,it.sheet])[1]);};
    var dl=el('button','btn danger sm','Delete');dl.onclick=function(){deletePending(it);};
    acts.appendChild(ap);acts.appendChild(op);acts.appendChild(dl);
    card.appendChild(acts);wrap.appendChild(card);
  });
  $('content').innerHTML='';$('content').appendChild(wrap);
}
function defObj(k,v){var o={};o[k]=v;return o;}
function approveItem(it){
  api('update',{sheet:it.sheet,row:it._row,data:defObj(it.approveField,it.approveValue)}).then(function(res){
    if(!res||!res.ok){toast((res&&res.error)||'Approve failed',true);return;}
    toast('Approved — now live on your site.');checkPending();
  }).catch(function(){toast('Could not reach the backend.',true);});
}
function deletePending(it){
  if(!confirm('Delete this submission?\n\n'+(it.label||'(blank)')))return;
  api('delete',{sheet:it.sheet,row:it._row}).then(function(res){
    if(!res||!res.ok){toast((res&&res.error)||'Delete failed',true);return;}
    toast('Deleted.');checkPending();
  }).catch(function(){toast('Could not reach the backend.',true);});
}

/* ====================== ADD / EDIT FORM ====================== */
var editing=null;
function distinctValues(col){var seen={};S.rows.forEach(function(r){var v=(r[col]||'').trim();if(v)seen[v]=1;});return Object.keys(seen);}
function uniq(a){var s={},o=[];a.forEach(function(v){if(!(v in s)){s[v]=1;o.push(v);}});return o;}
function buildOptionField(h,opts,multi,val){
  var wrap=el('div');wrap.id='fw-'+h;
  if(multi){
    var sel=val?val.split(/\s*,\s*/).filter(Boolean):[];
    var box=el('div');box.style.cssText='border:1px solid var(--line);border-radius:10px;padding:8px 10px;max-height:170px;overflow:auto;background:#fbfcfe';
    var known={};
    opts.forEach(function(o){
      known[o[0]]=1;
      var lab=el('label');lab.style.cssText='display:flex;align-items:center;gap:8px;padding:3px 0;font-size:14px;text-transform:none;letter-spacing:0;color:var(--ink);font-weight:400;margin:0';
      var cb=el('input');cb.type='checkbox';cb.className='f-cb';cb.value=o[0];cb.style.width='auto';
      if(sel.indexOf(o[0])>=0)cb.checked=true;
      lab.appendChild(cb);lab.appendChild(document.createTextNode(o[1]));
      box.appendChild(lab);
    });
    wrap.appendChild(box);
    var leftover=sel.filter(function(v){return !known[v];}).join(', ');
    var oth=el('input','field');oth.id='f-'+h+'-other';oth.placeholder='Other (type your own, comma-separated)…';oth.value=leftover;oth.style.marginTop='6px';
    wrap.appendChild(oth);
  } else {
    var s=el('select','field');s.id='f-'+h;
    var blank=el('option',null,'');blank.value='';s.appendChild(blank);
    var matched=(val==='');
    opts.forEach(function(o){var op=el('option',null,o[1]);op.value=o[0];if(o[0]===val){op.selected=true;matched=true;}s.appendChild(op);});
    var oo=el('option',null,'Other (type my own)…');oo.value=OTHER;s.appendChild(oo);
    var oth=el('input','field');oth.id='f-'+h+'-other';oth.placeholder='Type your own…';oth.style.cssText='margin-top:6px;display:none';
    if(!matched&&val){oo.selected=true;oth.value=val;oth.style.display='block';}
    s.addEventListener('change',function(){oth.style.display=(s.value===OTHER)?'block':'none';});
    wrap.appendChild(s);wrap.appendChild(oth);
  }
  return wrap;
}
function readField(h){
  var fo=FIELD_OPTIONS[S.current+'.'+h];
  if(fo){
    if(fo.multi){
      var vals=[],wrap=$('fw-'+h);
      if(wrap)wrap.querySelectorAll('.f-cb').forEach(function(cb){if(cb.checked)vals.push(cb.value);});
      var oth=$('f-'+h+'-other');
      if(oth&&oth.value.trim())oth.value.split(/\s*,\s*/).forEach(function(v){if(v&&vals.indexOf(v)<0)vals.push(v);});
      return vals.join(', ');
    }
    var s=$('f-'+h);if(!s)return '';
    if(s.value===OTHER){var o=$('f-'+h+'-other');return o?o.value.trim():'';}
    return s.value;
  }
  var f=$('f-'+h);return f?f.value:'';
}
function sectionImg(){
  var m={Stories:'images/stories',Events:'images/events',Passings:'images/passings',Ads:'images/ads',Education:'images/education',Services:'images/cards',shuls:'images/synagogues',Charities:'images/charities',SelfHelp:'images/selfhelp',RealEstate:'images/realestate',Hechsherim:'images/hechsher'};
  var folder=m[S.current]||('images/'+String(S.current||'misc').toLowerCase());
  return {folder:folder, base:'https://houstonjewishinfo.com/'+folder+'/'};
}
function resolveImg(v){v=(v||'').trim();if(!v)return '';if(/^https?:\/\//i.test(v))return v;if(/^\//.test(v))return 'https://houstonjewishinfo.com'+v;return sectionImg().base+v;}
function imgFieldKeys(h){return /image|img|photo|flyer|logo/i.test(h);}
function cleanName(s){var x=String(s||'').trim().toLowerCase().replace(/[^a-z0-9._-]+/g,'-').replace(/-+/g,'-').replace(/^[-.]+|[-.]+$/g,'');return x||'image';}
var AD_SIZES={'right-sidebar':'600 \u00d7 500 px, landscape \u2014 shows small on desktop, full width on phones','mobile':'1000 \u00d7 400 px, wide banner \u2014 spans the feed on phones','mazaltov':'800 \u00d7 500 px, landscape','mazaltov-mobile':'1000 \u00d7 400 px, wide banner \u2014 for phones','real-estate':'600 \u00d7 500 px, landscape','real-estate-mobile':'1000 \u00d7 400 px, wide banner \u2014 for phones'};
function adSizeHint(area){ return AD_SIZES[area]||'landscape, about 800 \u00d7 500 px'; }
function imgSizeHint(coll, field){
  var f=String(field||'').toLowerCase();
  if(coll==='Hechsherim'||/hechsher/.test(f)) return 'square, about 200 \u00d7 200 px \u2014 a transparent PNG works best';
  if(coll==='Stories') return '800 \u00d7 400 px, landscape \u2014 shown as a wide thumbnail';
  if(/card/.test(f)) return '1050 \u00d7 600 px, landscape \u2014 business-card shape (1.75:1)';
  if(/flyer/.test(f)) return 'portrait flyer, about 1080 \u00d7 1350 px';
  if(/logo/.test(f)) return 'square-ish, about 400 \u00d7 400 px \u2014 a transparent PNG works best';
  return 'landscape, about 1000 \u00d7 600 px';
}
function buildImageField(h,val){
  var wrap=el('div','imgfield');
  var inp=el('input','field');inp.id='f-'+h;inp.value=val;inp.placeholder='filename or full URL';
  var prev=el('img','imgprev');prev.alt='';
  function setPrev(v){var u=resolveImg(v);if(u){prev.src=u;prev.style.display='';}else{prev.style.display='none';}}
  setPrev(val);
  inp.addEventListener('input',function(){setPrev(inp.value);});
  var up=el('div','imgup');
  var file=el('input');file.type='file';file.accept='image/*';file.className='imgfile';
  var nm=el('input','field imgname');nm.placeholder='name to save, e.g. my-photo.jpg';
  var btn=el('button','btn ghost sm','Upload');btn.type='button';btn.disabled=true;
  var st=el('span','imgstatus');
  file.addEventListener('change',function(){
    var f=file.files&&file.files[0];if(!f){btn.disabled=true;return;}
    var ext=((f.name.split('.').pop())||'jpg').toLowerCase();
    var bn=(editing&&S.headers[0]&&editing[S.headers[0]])?editing[S.headers[0]]:f.name.replace(/\.[^.]+$/,'');
    nm.value=cleanName(bn)+'.'+ext;btn.disabled=false;st.textContent='';
  });
  btn.onclick=function(){
    var f=file.files&&file.files[0];if(!f){toast('Pick an image first.',true);return;}
    var name=cleanName(nm.value||f.name);
    if(!/\.[a-z0-9]+$/i.test(name))name+='.'+(((f.name.split('.').pop())||'jpg').toLowerCase());
    btn.disabled=true;st.textContent='Uploading\u2026';
    var rd=new FileReader();
    rd.onload=function(){
      var b64=String(rd.result).split(',')[1]||'';
      api('uploadImage',{folder:sectionImg().folder,name:name,content:b64}).then(function(res){
        btn.disabled=false;
        if(!res||!res.ok){st.textContent='';toast((res&&res.error)||'Upload failed.',true);return;}
        inp.value=res.url;setPrev(res.url);st.textContent='Uploaded \u2713';toast('Image uploaded \u2713');
      }).catch(function(){btn.disabled=false;st.textContent='';toast('Could not reach the backend.',true);});
    };
    rd.readAsDataURL(f);
  };
  up.appendChild(file);up.appendChild(nm);up.appendChild(btn);up.appendChild(st);
  wrap.appendChild(inp);wrap.appendChild(el('div','imghint','Recommended size: '+imgSizeHint(S.current,h)));wrap.appendChild(prev);wrap.appendChild(up);
  return wrap;
}
function openForm(row){
  if(S.mode!=='full')return;
  editing=row||null;
  $('modalTitle').textContent=(row?'Edit ':'Add new ')+S.current.replace(/s$/,'');
  var body=$('modalBody');body.innerHTML='';
  S.headers.forEach(function(h){
    body.appendChild(el('label',null,h));
    var val=row?(row[h]||''):'';var input;
    if(imgFieldKeys(h)){body.appendChild(buildImageField(h,val));return;}
    var fo=FIELD_OPTIONS[S.current+'.'+h];
    if(fo){ var foOpts=(fo.dynamic==='hechsher')?(S.hechsherNames||[]):fo.options; body.appendChild(buildOptionField(h,normOpts(foOpts),!!fo.multi,val)); return; }
    if(STATUSY.indexOf(h)>=0){
      input=el('select','field');input.id='f-'+h;
      var opts;
      if(h==='Status')opts=uniq(['active','pending'].concat(distinctValues(h)));
      else if(h==='Approved')opts=uniq(['yes',''].concat(distinctValues(h)));
      else{opts=distinctValues(h);if(!opts.length)opts=['Yes','No'];}
      if(opts.indexOf(val)<0&&val)opts.unshift(val);
      if(opts.indexOf('')<0)opts.unshift('');
      opts.forEach(function(o){var op=el('option',null,o);op.value=o;if(o===val)op.selected=true;input.appendChild(op);});
    } else if(LONG_FIELDS.indexOf(h)>=0){
      input=el('textarea','field');input.id='f-'+h;input.value=val;
    } else {
      input=el('input','field');input.id='f-'+h;input.value=val;
      var sug=distinctValues(h);
      if(sug.length){
        var listId='dl-'+h;
        input.setAttribute('list',listId);
        input.setAttribute('autocomplete','off');
        var dl=el('datalist');dl.id=listId;
        sug.forEach(function(o){var op=el('option');op.value=o;dl.appendChild(op);});
        body.appendChild(input);body.appendChild(dl);
        return;
      }
    }
    body.appendChild(input);
  });
  $('overlay').style.display='grid';
}
$('btnAdd').onclick=function(){openForm(null);};
$('btnCancel').onclick=function(){$('overlay').style.display='none';};
$('overlay').onclick=function(e){if(e.target===$('overlay'))$('overlay').style.display='none';};
$('btnSave').onclick=function(){
  var data={};S.headers.forEach(function(h){data[h]=readField(h);});
  $('btnSave').disabled=true;$('btnSave').textContent='Saving…';
  var call=editing?api('update',{sheet:S.current,row:editing._row,data:data}):api('create',{sheet:S.current,data:data});
  call.then(function(res){
    $('btnSave').disabled=false;$('btnSave').textContent='Save';
    if(!res||!res.ok){toast((res&&res.error)||'Save failed',true);return;}
    $('overlay').style.display='none';toast(editing?'Saved.':'Added.');
    selectCollection(S.current,$('colTitle').textContent);checkPending();
  }).catch(function(){$('btnSave').disabled=false;$('btnSave').textContent='Save';toast('Could not reach the backend.',true);});
};
function doDelete(row){
  var nameCol=S.headers[0];
  if(!confirm('Delete this entry?\n\n'+nameCol+': '+(row[nameCol]||'(blank)')+'\n\nThis removes the row from the sheet.'))return;
  api('delete',{sheet:S.current,row:row._row}).then(function(res){
    if(!res||!res.ok){toast((res&&res.error)||'Delete failed',true);return;}
    toast('Deleted.');selectCollection(S.current,$('colTitle').textContent);checkPending();
  }).catch(function(){toast('Could not reach the backend.',true);});
}
