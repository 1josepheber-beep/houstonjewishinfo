  .s-ac-title{font-size:14.5px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .s-suggest-card a{color:var(--navy);font-weight:700;text-decoration:none;font-size:15px;white-space:nowrap;}

  .s-status{color:var(--muted);font-size:14px;margin:0 0 16px;}
  .s-results{display:grid;grid-template-columns:1fr;gap:14px;}
  .s-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:16px 18px;}
  .s-card-top{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:7px;}
  .s-tag{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:20px;color:var(--white);}

  .s-tag-event{background:#2e7d52;}
  .s-tag-mazal{background:#a3375a;}
  .s-tag-passing{background:#5b5b5b;}
  .s-tag-dir{background:var(--navy);}
  .s-tag-page{background:#f0e2c0;color:#7a5a14;}
  .s-badge{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:#f3ead6;color:#8a6516;}
  .s-date{margin-left:auto;font-size:12px;color:var(--muted);letter-spacing:.03em;}
  .s-card-title{font-family:Georgia,"Times New Roman",serif;color:var(--navy);font-size:19px;margin:0 0 4px;}
  .s-card-sub{font-size:13px;color:var(--muted);margin-bottom:6px;}

  .s-card-link{display:inline-block;margin-top:10px;font-size:14px;font-weight:600;color:var(--navy);text-decoration:none;border-bottom:2px solid var(--gold);}

  .s-cats{margin-top:8px;}
  .s-cats-title{font-family:Georgia,serif;color:var(--navy);font-size:17px;margin:0 0 12px;}
  .s-cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
  .s-cats-grid a{display:block;background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px 16px;text-decoration:none;color:var(--navy);font-weight:600;font-size:14.5px;}
  .s-cats-grid a:hover{border-color:var(--gold);color:var(--gold);}
  .s-foot{background:var(--navy);color:#c9cfdd;text-align:center;padding:22px 18px;font-size:13px;}
  .s-foot a{color:#dfe3ee;}

    {kw:['contact','submit','advertise','advertising','sponsor'],url:'/contact',label:'Contact / Submit'}
  ];
  function routeMatches(q){
    if(!q) return [];
    var s=' '+norm(q).replace(/[^a-z0-9 ]+/g,' ').replace(/\s+/g,' ').trim()+' ';
    var seen={}, hits=[];
    ROUTES.forEach(function(r){
      for(var i=0;i<r.kw.length;i++){
        if(s.indexOf(' '+r.kw[i]+' ')>-1){ if(!seen[r.url]){ seen[r.url]=1; hits.push(r); } break; }
      }
    });
    return hits.slice(0,2);
  }

  var CATS=[
    {url:'/services',label:'Services & Kosher Food'},
    {url:'/shuls',label:'Shuls & Eruv Map'},

  ];

  }
  var SECTION_NAMES={'/services':'Services','/shuls':'Shuls','/mikvahs':'Mikvahs','/education':'Education','/jobs':'Jobs','/charities':'Charities','/real-estate':'Real Estate','/things-to-do':'Things to Do','/':'Home'};

  /* ---------- gviz ---------- */
  function cellStr(c){ if(!c) return ''; return c.f!=null? String(c.f) : (c.v==null?'':String(c.v)); }
  function parseDate(c){
    if(!c) return null;
    var v=c.v,f=c.f;
    if(typeof v==='string'&&/^Date\(/.test(v)){ var n=v.match(/\d+/g); if(n) return new Date(+n[0],+n[1],+(n[2]||1)); }
    if(Object.prototype.toString.call(v)==='[object Date]') return v;
    if(typeof f==='string'){ var t=Date.parse(f); if(!isNaN(t)) return new Date(t); }
    if(typeof v==='string'){ var t2=Date.parse(v); if(!isNaN(t2)) return new Date(t2); }
    return null;
  }
  function tabURL(tab){ return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=1&sheet='+encodeURIComponent(tab); }
  function getTab(tab){
    return fetch(tabURL(tab)).then(function(r){ return r.text(); }).then(function(text){
      var json=JSON.parse(text.substring(47,text.length-2));
      var cols=json.table.cols.map(function(c){ return (c.label||'').toLowerCase().trim(); });
      return (json.table.rows||[]).map(function(row){
        var o={_cells:{}};
        cols.forEach(function(col,i){ if(!col) return; var c=row.c?row.c[i]:null; o[col]=cellStr(c); o._cells[col]=c; });
        return o;
      });
    }).catch(function(){ return []; });
  }
  function active(o){ return norm(o.status).trim()==='active'; }
  function fmtDate(d){ return d? d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : ''; }
  function pick(o,names){ for(var i=0;i<names.length;i++){ var v=o[names[i]]; if(v!=null&&String(v).trim()!=='') return String(v).trim(); } return ''; }
  function joinPick(o,names,max){ var out=[]; for(var i=0;i<names.length&&out.length<max;i++){ var v=o[names[i]]; if(v!=null&&String(v).trim()!=='') out.push(String(v).trim()); } return out.join(' \u00b7 '); }
  function firstShort(o){ for(var k in o){ if(k==='_cells'||k==='status'||k==='approved')continue; var v=o[k]; if(typeof v==='string'){ v=v.trim(); if(v&&v.length<=60) return v; } } return ''; }
  function fieldsText(o){ var s=[]; for(var k in o){ if(k==='_cells')continue; var v=o[k]; if(typeof v==='string'&&v) s.push(v); } return norm(s.join(' ')); }

  /* ---------- item builders ---------- */
  function mk(type,label,title,date,sub,body,link){
    return {type:type,label:label,title:title,date:date||null,sub:sub||'',body:body||'',link:link||'',section:'',badge:'',searchText:norm([title,sub,body,label].join(' '))};
  }
  function feedItem(kind,row){
    var d=parseDate(row._cells.date);
    if(kind==='news'){ if(!active(row)||!row.headline)return null; return mk('news','News',row.headline,d,row.byline||row.label||'',row.excerpt||'',row.linkurl||''); }
    if(kind==='event'){ if(!active(row)||!row.title)return null; var it=mk('event','Event',row.title,d,row.location||row.presenter||'',row.description||'',row.ticketurl||''); if(d&&d<TODAY) it.badge='Past event'; return it; }
    if(kind==='mazal'){ if(!active(row)||!row.name)return null; var m=mk('mazal',row.type||'Mazal Tov',row.name,d,row.city||'',row.message||'',''); if(d&&d<MAZAL_CUTOFF) m.badge='Archived'; return m; }
    if(kind==='passing'){ if(!active(row)||!row.name)return null; var p=[]; if(row.levaya)p.push('Levaya: '+row.levaya); if(row.shiva)p.push('Shiva: '+row.shiva); if(row.message)p.push(row.message); return mk('passing','In Memoriam',row.name,d,row.city||'',p.join(' \u00b7 '),''); }
    return null;
  }
  function dirItem(cfg,row){
    if(cfg.filter==='approved'){ if(norm(row.approved).trim()!=='yes') return null; }
    else { var __s=norm(row.status).trim(); if(cfg.strict ? __s!=='active' : (__s && __s!=='active')) return null; }
    var title=pick(row,['name','title','business','businessname','company','organization','school','shul','headline']) || firstShort(row);
    if(!title) return null;
    var sub=joinPick(row,['category','city','neighborhood','area','address','location'],2);
    var body=pick(row,['description','about','details','summary','services','message','excerpt','notes','bio']);
    var it=mk('dir',cfg.label,title,null,sub,body,'');
    it.section=cfg.link;
    it.searchText=fieldsText(row)+(cfg.kw?(' '+cfg.kw):'');
    return it;
  }

  /* ---------- tab config ---------- */
  var CONFIGS=[
    {tab:'Stories',kind:'news'},{tab:'Events',kind:'event'},{tab:'MazalTov',kind:'mazal'},{tab:'Passings',kind:'passing'},
    {tab:'Education',kind:'dir',label:'School',link:'/education',kw:'school schools yeshiva education adult learning kollel',strict:true},

    {tab:'Activities',kind:'dir',label:'Things to Do',link:'/things-to-do',kw:'things to do activities attraction family outing fun'}
  ];
  var FEED_KINDS={news:1,event:1,mazal:1,passing:1};

  /* static pages / resources so searches like "eruv" return a real result */
  var PAGES=[
    {t:'Houston Eruv Map',lab:'Resource',link:'/shuls?eruv=open',kw:'eruv eiruv eruv map boundary'},
    {t:'Shuls & Synagogues',lab:'Section',link:'/shuls',kw:'shul shuls synagogue synagogues minyan minyanim minyon davening daven congregation temple orthodox'},
    {t:'Mikvahs',lab:'Section',link:'/mikvahs',kw:'mikvah mikvahs mikvaot mikveh mikva'},

    {t:'Kosher Food & Restaurants',lab:'Section',link:'/services',kw:'kosher restaurant restaurants food dining eat eatery cafe takeout catering bakery'},
    {t:'Kosher Supermarkets & Groceries',lab:'Section',link:'/services',kw:'supermarket supermarkets grocery groceries market markets store stores shop shops shopping kosher market'},
    {t:'Real Estate',lab:'Section',link:'/real-estate',kw:'real estate realtor realty apartment rent rental house home homes property mortgage'},

    {t:'Community Services Directory',lab:'Section',link:'/services',kw:'services business businesses directory plumber electrician attorney lawyer doctor contractor dentist'},
    {t:'Contact / Submit a Listing',lab:'Section',link:'/contact',kw:'contact submit advertise advertising sponsor add listing'}
  ];
  function pageItem(p){ var it=mk('page',p.lab,p.t,null,'','',''); it.section=p.link; it.searchText=norm(p.t+' '+p.kw); return it; }

  var ALL=[], LOADED=0, TOTAL=CONFIGS.length;

  /* ---------- search + render ---------- */
  var SYN_GROUPS=[
    ['supermarket','supermarkets','grocery','groceries','market','markets','store','stores','shop','shops','shopping'],
    ['restaurant','restaurants','dining','eatery','eateries','cafe','cafes','diner','takeout','eats'],
    ['shul','shuls','synagogue','synagogues','minyan','minyanim','minyon','davening','congregation','temple'],
    ['mikvah','mikvahs','mikvaot','mikveh','mikva'],
    ['school','schools','yeshiva','yeshivas','preschool','academy'],
    ['doctor','doctors','physician','physicians','pediatrician','dentist','dentists'],
    ['lawyer','lawyers','attorney','attorneys','legal'],
    ['realtor','realtors','realty','apartment','apartments','rental','rentals','condo','mortgage'],
    ['job','jobs','hiring','employment','position','positions','career','careers','vacancy'],
    ['charity','charities','tzedakah','donation','donations','nonprofit','chesed'],
    ['gemach','gemachim','gemachs'],
    ['catering','caterer','caterers'],
    ['bakery','bakeries','baker','challah'],
    ['plumber','plumbing','electrician','handyman','contractor','contractors','hvac'],
    ['cleaning','cleaner','cleaners','housekeeping','maid'],
    ['security','alarm','camera','cameras'],
    ['marketing','advertising','branding'],
    ['judaica','seforim','sefarim','gifts','giftware'],
    ['eruv','eiruv'],
    ['dairy','milchig','milchik','milchigs','chalavi'],
    ['meat','meaty','fleishig','fleishik','fleishigs','basari','glatt'],
    ['pareve','parve','pareveh','parev'],
    ['gelato','creamery','custard','sorbet','froyo','icecream'],
    ['pizza','pizzeria','pizzas'],
    ['sushi','sashimi'],
    ['bagel','bagels','bagelry'],
    ['deli','delicatessen'],
    ['grill','grille','steakhouse','bbq','barbecue'],
    ['camp','camps','daycamp'],
    ['preschool','daycare','nursery','playgroup','playgroups'],
    ['salon','barber','barbershop','haircut','hairdresser'],
    ['coffee','cafe','espresso','coffeehouse'],
    ['florist','flowers','flower'],
    ['photographer','photography','photo','photos'],
    ['tutor','tutoring','tutors']
  ];
  var SYN={}; SYN_GROUPS.forEach(function(g){ g.forEach(function(w){ SYN[w]=g; }); });
  var _re={};
  function wordRe(w){ return _re[w] || (_re[w]=new RegExp('(^|[^a-z0-9])'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'([^a-z0-9]|$)')); }
  function termMatch(text,term){
    if(text.indexOf(term)>-1) return true;
    var g=SYN[term]; if(!g) return false;
    for(var i=0;i<g.length;i++){ if(g[i]!==term && wordRe(g[i]).test(text)) return true; }
    return false;
  }
  function hit(terms,text){ for(var i=0;i<terms.length;i++){ if(!termMatch(text,terms[i])) return false; } return true; }
  var PHRASES=[
    {p:'ice cream', w:['ice cream','icecream','gelato','creamery','custard','sorbet','froyo','frozen yogurt','parlor']},
    {p:'frozen yogurt', w:['frozen yogurt','froyo','gelato','ice cream','icecream','creamery']},
    {p:'dry clean', w:['dry clean','dry cleaning','dry cleaner','cleaners','laundry']},
    {p:'coffee shop', w:['coffee','cafe','espresso','latte','coffeehouse']},
    {p:'summer camp', w:['summer camp','day camp','camp','camps','overnight camp']},
    {p:'day camp', w:['day camp','summer camp','camp','camps']},
    {p:'hair salon', w:['hair salon','salon','barber','barbershop','haircut','hairdresser']},
    {p:'real estate', w:['real estate','realtor','realty','homes','property','broker']},
    {p:'car repair', w:['car repair','auto repair','mechanic','automotive','body shop']}
  ];
  function matchQuery(text, qn){
    var work=qn, ok=true, i, p, ws, any;
    for(p=0;p<PHRASES.length;p++){
      if(work.indexOf(PHRASES[p].p)>-1){
        ws=PHRASES[p].w; any=false;
        for(i=0;i<ws.length;i++){ if(text.indexOf(ws[i])>-1){ any=true; break; } }
        if(!any){ ok=false; break; }
        work=work.split(PHRASES[p].p).join(' ');
      }
    }
    if(!ok) return false;
    var terms=work.split(/\s+/).filter(Boolean);
    return hit(terms, text);
  }
  function relScore(x,q){ var t=norm(x.title); if(t===q)return 4; if(t.indexOf(q)===0)return 3; if(t.indexOf(q)>-1)return 2; return 1; }

  function sectionHref(x){ return (x.type==='dir') ? (x.section+'?find='+encodeURIComponent(x.title)) : x.section; }
  function destFor(x){
    if(x.type==='dir'){ return {href:x.section+'?find='+encodeURIComponent(x.title), ext:false}; }
    if(x.type==='news'||x.type==='event'||x.type==='mazal'||x.type==='passing'){ return {href:'/?find='+encodeURIComponent(x.title), ext:false}; }
    if(x.section){ return {href:x.section, ext:false}; }
    var u=extURL(x.link); if(u) return {href:u, ext:true};
    return null;
  }
  function cardHTML(x){
    var top='<span class="s-tag s-tag-'+x.type+'">'+esc(x.label)+'</span>';
    if(x.badge) top+='<span class="s-badge">'+esc(x.badge)+'</span>';
    if(x.date) top+='<span class="s-date">'+esc(fmtDate(x.date))+'</span>';
    var h='<article class="s-card"><div class="s-card-top">'+top+'</div>';
    h+='<h3 class="s-card-title">'+esc(x.title)+'</h3>';
    if(x.sub) h+='<div class="s-card-sub">'+esc(x.sub)+'</div>';
    if(x.body) h+='<p class="s-card-body">'+esc(trunc(x.body,220))+'</p>';
    var d=destFor(x);
    if(d){
      var lbl=(x.type==='dir')?('View on '+(SECTION_NAMES[String(x.section).split('?')[0].split('#')[0]]||'page')+' →'):((x.type==='news'||x.type==='event'||x.type==='mazal'||x.type==='passing')?'View in Community Feed →':(d.ext?'Visit ↗':'View →'));
      h+='<a class="s-card-link" href="'+esc(d.href)+'"'+(d.ext?' target="_blank" rel="noopener"':'')+'>'+lbl+'</a>';
    }
    return h+'</article>';
  }

  function renderRoutes(q){
    var r=routeMatches(q);
    sug.innerHTML = r.length ? r.map(function(x){
      return '<div class="s-suggest-card"><span>Looking for '+esc(x.label)+'?</span><a href="'+esc(x.url)+'">Go to '+esc(x.label)+' \u2192</a></div>';
    }).join('') : '';
  }

  function runSearch(q){
    q=String(q||'').trim();
    try{ history.replaceState(null,'', q? ('?q='+encodeURIComponent(q)) : location.pathname); }catch(e){}
    document.title = q? ('Search: '+q+' — Houston Jewish Info') : 'Search — Houston Jewish Info';
    renderRoutes(q);
    if(!q){ status.textContent=''; results.innerHTML=catsHTML('Browse a section'); return; }
    var ql=norm(q), terms=ql.split(/\s+/).filter(Boolean);
    var m=ALL.filter(function(x){ return matchQuery(x.searchText, ql); });
    m.sort(function(a,b){
      var sa=relScore(a,ql), sb=relScore(b,ql); if(sa!==sb) return sb-sa;
      var at=a.date?a.date.getTime():null, bt=b.date?b.date.getTime():null;
      if(at!=null&&bt!=null) return bt-at;
      if(at!=null) return -1; if(bt!=null) return 1;
      return a.title.localeCompare(b.title);
    });
    if(m.length){
      status.textContent='Found '+m.length+' result'+(m.length===1?'':'s')+(LOADED<TOTAL?' so far (still loading\u2026)':'')+' for \u201c'+q+'\u201d';
      results.innerHTML=m.map(cardHTML).join('');
    } else if(LOADED<TOTAL){
      status.textContent='Searching\u2026'; results.innerHTML='';
    } else {
      status.textContent='No results for \u201c'+q+'\u201d.'; results.innerHTML=catsHTML('Try a section instead');
    }
  }

  /* ---------- autocomplete ---------- */
  var acItems=[], acIdx=-1, acOpen=false;
  function hideAC(){ ac.classList.remove('open'); acOpen=false; acIdx=-1; }
  function buildAC(q){
    q=norm(q).trim(); if(q.length<2) return [];
    var terms=q.split(/\s+/).filter(Boolean);
    var arr=ALL.filter(function(x){ return matchQuery(x.searchText, q); });
    arr.sort(function(a,b){ return relScore(b,q)-relScore(a,q); });
    var seen={}, out=[];
    for(var i=0;i<arr.length&&out.length<8;i++){ var k=arr[i].type+'|'+norm(arr[i].title); if(seen[k])continue; seen[k]=1; out.push(arr[i]); }
    return out;
  }
  function renderAC(list){
    acItems=list; acIdx=-1;
    if(!list.length){ hideAC(); return; }
    ac.innerHTML=list.map(function(x,i){
      var d=destFor(x); var arrow=d?(d.ext?'\u2197':'\u2192'):'';
      return '<div class="s-ac-item" role="option" data-i="'+i+'"><span class="s-ac-title">'+esc(x.title)+'</span><span class="s-ac-tag">'+esc(x.label)+'</span>'+(arrow?'<span class="s-ac-go">'+arrow+'</span>':'')+'</div>';
    }).join('');
    ac.classList.add('open'); acOpen=true;
  }
  function chooseAC(i){
    var x=acItems[i]; if(!x) return;
    hideAC();
    var d=destFor(x);
    if(d){ if(d.ext){ window.open(d.href,'_blank','noopener'); } else { location.href=d.href; } return; }
    input.value=x.title; runSearch(x.title);
  }
  ac.addEventListener('mousedown', function(e){
    var it=e.target.closest && e.target.closest('.s-ac-item'); if(!it) return;
    e.preventDefault(); chooseAC(+it.getAttribute('data-i'));
  });
  function highlight(){
    var nodes=ac.querySelectorAll('.s-ac-item');
    for(var i=0;i<nodes.length;i++){ nodes[i].classList.toggle('active', i===acIdx); }
  }

  input.addEventListener('input', debounce(function(){ renderAC(buildAC(input.value)); }, 130));
  input.addEventListener('focus', function(){ if(input.value.trim().length>=2) renderAC(buildAC(input.value)); });
  input.addEventListener('keydown', function(e){
    if(!acOpen) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); acIdx=Math.min(acIdx+1,acItems.length-1); highlight(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); acIdx=Math.max(acIdx-1,0); highlight(); }
    else if(e.key==='Enter'){ if(acIdx>=0){ e.preventDefault(); chooseAC(acIdx); } }
    else if(e.key==='Escape'){ hideAC(); }
  });
  document.addEventListener('click', function(e){ if(!form.contains(e.target)) hideAC(); });
  form.addEventListener('submit', function(e){ e.preventDefault(); hideAC(); runSearch(input.value); });

  /* ---------- load data ---------- */
  function ingest(cfg,rows){
    (rows||[]).forEach(function(row){
      var it = FEED_KINDS[cfg.kind] ? feedItem(cfg.kind,row) : dirItem(cfg,row);
      if(it) ALL.push(it);
    });
  }
  function onProgress(){
    LOADED++;
    var q=input.value.trim();
    if(q) runSearch(q);
    if(acOpen && q.length>=2) renderAC(buildAC(q));
    if(LOADED>=TOTAL && !q){ /* idle */ }
  }

  /* init */
  PAGES.forEach(function(p){ ALL.push(pageItem(p)); });
  var Q=qparam();
  input.value=Q;
  if(Q){ runSearch(Q); }
  else { input.focus(); renderRoutes(''); results.innerHTML=catsHTML('Browse a section'); }

  CONFIGS.forEach(function(cfg){
    getTab(cfg.tab).then(function(rows){ ingest(cfg,rows); }).catch(function(){}).then(onProgress);
  });
})();
</script>
<script>
/* hji-clearx */
(function(){
  function clearable(input){
    if(!input||input.__hjicx)return; input.__hjicx=1;
    var par=input.parentNode; if(!par)return;
    if(getComputedStyle(par).position==='static') par.style.position='relative';
    var btn=document.createElement('button');
    btn.type='button'; btn.className='hji-cx'; btn.setAttribute('aria-label','Clear search'); btn.innerHTML='&times;';
    par.appendChild(btn);
    var pr=parseInt(getComputedStyle(input).paddingRight)||0; if(pr<26) input.style.paddingRight='26px';
    function place(){ var p=par.getBoundingClientRect(), i=input.getBoundingClientRect(); if(!i.width)return; btn.style.top=(i.top-p.top+i.height/2)+'px'; btn.style.left=(i.right-p.left-21)+'px'; }
    function sync(){ var on=!!(input.value&&input.value.length); btn.style.display=on?'flex':'none'; if(on) place(); }
    input.addEventListener('input',sync);
    window.addEventListener('resize',sync);
    btn.addEventListener('mousedown',function(e){e.preventDefault();});
    btn.addEventListener('click',function(e){e.stopPropagation(); input.value=''; try{input.dispatchEvent(new Event('input',{bubbles:true}));}catch(_){ } try{input.focus();}catch(_){ } sync();});
    sync();
  }
  function init(){
    var nodes=document.querySelectorAll('#hjis-d-input,#hjis-m-input,.search-input,#eat-search,#act-search');
    Array.prototype.forEach.call(nodes,function(n){ if(n&&n.tagName==='INPUT') clearable(n); });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
</script>
<!-- GA4 search-term tracking -->
<script>
(function(){
  function send(term){
    term=(term||'').replace(/\s+/g,' ').trim();
    if(term.length<2) return;
    if(send._last===term.toLowerCase()) return;
    send._last=term.toLowerCase();
    try{ if(typeof gtag==='function'){ gtag('event','search',{search_term:term}); } }catch(e){}
  }
  function attach(el){
    if(!el||el._hjisST) return; el._hjisST=1;
    var t;
    el.addEventListener('input',function(){ clearTimeout(t); var v=el.value; t=setTimeout(function(){ send(v); },1400); });
    el.addEventListener('keydown',function(e){ if((e.key||'')==='Enter'){ clearTimeout(t); send(el.value); } });
  }
  function init(){
    attach(document.getElementById('hjis-d-input'));
    attach(document.getElementById('hjis-m-input'));
    attach(document.getElementById('q'));
    try{ var m=location.search.match(/[?&]q=([^&]*)/); if(m){ send(decodeURIComponent(m[1].replace(/\+/g,' '))); } }catch(e){}
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',init); } else { init(); }
})();
</script>
